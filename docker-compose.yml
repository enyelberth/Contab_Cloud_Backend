version: "3.9"

services:
  db:
    container_name: kaizen_db
    image: postgres:15-alpine # Alpine es más ligero y seguro
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Script opcional para inicializar tablas al arrancar por primera vez
      # - ./init-db:/docker-entrypoint-initdb.d 
    networks:
      - kaizen_network
    healthcheck: # Útil para que otros servicios esperen a que la DB esté lista
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Interfaz gráfica para gestionar la DB (opcional pero recomendada)
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - kaizen_network

networks:
  kaizen_network:
    driver: bridge

volumes:
  pgdata: